name: Agent Cognitive Audit (Evals)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  agent-evals:
    name: Run LLM Evals & Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Execute LLM Evals
        env:
          OPENAI_API_KEY: \${{ secrets.OPENAI_API_KEY }}
          LANGSMITH_API_KEY: \${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING: 'true'
          LANGSMITH_PROJECT: 'reservAItion-prod'
        run: npx ts-node tests/evals/agentEvaluator.ts

      - name: Notify Quality Failure
        if: failure()
        run: |
          echo "La calidad de los agentes no cumple el umbral del 95%."
          # Aquí se podría integrar un envío de Slack o alerta de Ops
